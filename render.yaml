# Render Blueprint — deploy free: in the Render dashboard, "New +" -> "Blueprint",
# connect this repo, and click Apply. Render reads this file.
#
# FREE PLAN NOTE: the free instance has no persistent disk and sleeps after ~15 min
# idle (slow first request). The login store lives at /tmp, which is writable but
# resets on restart/redeploy — so accounts and terms-acknowledgments reset then.
# Fine for a demo or single user. For persistent accounts, see the commented
# "persistent" block at the bottom.
services:
  - type: web
    name: estate-planning
    runtime: docker
    plan: free
    region: singapore          # closest Render region to Thailand
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: ESTATE_SECRET_KEY
        generateValue: true    # generated once, stable across restarts
      - key: ESTATE_USER_STORE
        value: /tmp/users.json # writable; ephemeral on the free plan
      # Uncomment and set in the dashboard to enable "Sign in with Google":
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false

# ---------------------------------------------------------------------------
# To make accounts persistent, upgrade to a paid instance with a disk:
#   change   plan: free   ->   plan: starter
#   change   ESTATE_USER_STORE value   ->   /data/users.json
#   and add, at the same indentation as envVars:
#     disk:
#       name: data
#       mountPath: /data
#       sizeGB: 1
# ---------------------------------------------------------------------------
