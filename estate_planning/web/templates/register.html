{% extends "base.html" %}
{% block title %}{{ t('register_title') }} · {{ t('brand') }}{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>{{ t('register_title') }}</h1>
  <form method="post" action="{{ url_for('register') }}">
    <label>{{ t('username') }}
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>{{ t('password') }} <span class="muted">{{ t('password_hint') }}</span>
      <input type="password" name="password" autocomplete="new-password" minlength="8" required>
    </label>
    <button type="submit">{{ t('create_account_btn') }}</button>
  </form>
  <p class="muted">{{ t('have_account') }} <a href="{{ url_for('login') }}">{{ t('login_title') }}</a>.</p>
</div>
{% endblock %}
