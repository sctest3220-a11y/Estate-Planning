{% extends "base.html" %}
{% block title %}Log in · Estate Planning{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Log in</h1>
  <form method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <label>Username
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
  <p class="muted">No account? <a href="{{ url_for('register') }}">Create one</a>.</p>
</div>
{% endblock %}
