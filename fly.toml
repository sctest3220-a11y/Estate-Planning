# Fly.io config. Deploy with:  fly launch --copy-config --no-deploy  (then edit
# the app name if taken), create the volume and secret, then `fly deploy`.
app = "estate-planning"
primary_region = "sin"          # Singapore — closest Fly region to Thailand

[build]
  dockerfile = "Dockerfile"

[env]
  ESTATE_USER_STORE = "/data/users.json"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume for the login store. Create it once:
#   fly volumes create data --region sin --size 1
[[mounts]]
  source = "data"
  destination = "/data"
